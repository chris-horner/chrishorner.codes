{{ define "main" }}

<body id="portfolio">

  <div id="content-outer-container">
    <div id="list-inner-container">
      <nav class="detail-breadcrumb">
        <a href="{{ "/" | relURL }}">Chris Horner</a>
      </nav>
      <h2 class="list-title">
        {{ partial "icons/app_portfolio.svg" }}
        <span>{{ .Title }}</span>
      </h2>
      <ul class="list">
        {{ range .Pages }}
        <li>
          <a href="{{ .Permalink }}">
            <div class="portfolio-item">
              <img src="{{ printf "img/%s" .Params.icon | relURL }}"/>
              <div>
                <h3>{{ .Title }}</h3>
                <p>{{ .Params.summary }}</p>
                <span id="date">{{ .Date.Format "2006" }}</span>
              </div>
            </div>
          </a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>

</body>
{{ end }}
