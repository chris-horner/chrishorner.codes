{{ define "main" }}

<body id="post-item">

  <div id="content-outer-container">
    <div id="content-inner-container">
      <nav class="detail-breadcrumb">
        <a href="{{ "/" | relURL }}">Chris Horner</a>
        <span class="breadcrumb-sep">›</span>
        <a href="{{ "post/" | relURL }}">
          {{ partial "icons/blog.svg" }}
          <span>Blog</span>
        </a>
      </nav>
      <h2>{{ .Title }}</h2>
      <div class="detail-meta">
        <span>{{ .Date.Format "2 January 2006" }}</span>
      </div>
      {{ .Content }}
      <p class="signature">&mdash; {{ .Site.Params.author.name }}</p>
    </div>
  </div>

</body>

{{ end }}
