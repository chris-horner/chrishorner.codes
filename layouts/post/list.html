{{ define "main" }}

<body id="posts">

  <div id="content-outer-container">
    <div id="list-inner-container">
      <nav class="detail-breadcrumb">
        <a href="{{ "/" | relURL }}">Chris Horner</a>
      </nav>
      <h2 class="list-title">
        {{ partial "icons/blog.svg" }}
        <span>{{ .Title }}</span>
      </h2>
      <ul class="list">
        {{ range .Pages }}
        <li>
          <a href="{{ .Permalink }}">
            <h3>{{ .Title }}</h3>
            <p>{{ .Params.summary }}</p>
            <span id="date">{{ .Date.Format "2 January 2006" }}</span>
          </a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>

</body>

{{ end }}
