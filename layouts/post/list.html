{{ define "main" }}

<body id="posts">

  <div id="content-outer-container">
    <div id="list-inner-container">
      <header class="list-header">
        <h1><a href="{{ "/" | relURL }}">Chris Horner</a></h1>
        <div class="list-subtitle">
          {{ partial "icons/blog.svg" }}
          <span>{{ .Title }}</span>
        </div>
      </header>
      <ul class="list">
        {{ range .Pages }}
        <li>
          <a href="{{ .Permalink }}">
            <h3>{{ .Title }}</h3>
            <p>{{ .Params.summary }}</p>
            <span id="date">{{ .Date.Format "2 January 2006" }}</span>
          </a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>

</body>

{{ end }}
